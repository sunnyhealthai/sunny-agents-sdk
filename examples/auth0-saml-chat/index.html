<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunny Agents SDK - Auth0 SAML Example</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Sunny Agents SDK - Auth0 SAML Example</h1>
        <p>
          This example demonstrates authentication via Auth0 Enterprise Connection (SAML).
          Configure your Auth0 domain, client ID, and SAML connection below.
        </p>
      </header>

      <section class="auth-panel">
        <h2>Auth0 Configuration</h2>
        <div class="form-group">
          <label for="auth0-domain">Auth0 Domain</label>
          <input 
            id="auth0-domain" 
            type="text" 
            placeholder="your-tenant.auth0.com" 
            value=""
          />
        </div>
        <div class="form-group">
          <label for="auth0-client-id">Auth0 Client ID</label>
          <input 
            id="auth0-client-id" 
            type="text" 
            placeholder="your-client-id" 
            value=""
          />
        </div>
        <div class="form-group">
          <label for="auth0-connection">Connection Name (e.g., 'guardian-saml')</label>
          <input 
            id="auth0-connection" 
            type="text" 
            placeholder="guardian-saml" 
            value=""
          />
        </div>
        <div class="form-group">
          <label for="auth0-organization">Organization (required for some clients)</label>
          <input 
            id="auth0-organization" 
            type="text" 
            placeholder="org_xxxxx" 
            value=""
          />
        </div>
        <div class="auth-status" id="auth-status">
          <span id="auth-status-text">Not authenticated</span>
        </div>
        <div class="auth-actions">
          <button id="auth-login" type="button">Login with Auth0</button>
          <button id="auth-logout" type="button" style="display: none;">Logout</button>
        </div>
      </section>

      <section class="chat-section">
        <div id="sunny-chat-container"></div>
      </section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
